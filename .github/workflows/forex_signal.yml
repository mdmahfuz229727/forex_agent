name: Forex Signal Bot

on:
  schedule:
    - cron: '0 8 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance anthropic pytz requests pandas numpy ta-lib-python || pip install yfinance anthropic pytz requests pandas numpy ta
      - name: Unzip agent files
        run: |
         unzip "forex_agent_new.zip" 
      - name: Run Forex Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python run_agent.py
